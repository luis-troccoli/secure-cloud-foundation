name: 'Terraform CI/CD Pipeline'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: 'Terraform Infrastructure'
    runs-on: ubuntu-latest
    
    steps:
      # Check out the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate with Azure using OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Install the specified version of Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Initialize the Terraform working directory
      - name: Terraform Init
        run: terraform init

      # Check if the code is formatted correctly
      - name: Terraform Format
        run: terraform fmt -check

      # Validate the Terraform configuration files
      - name: Terraform Validate
        run: terraform validate

      # Automated security scanning with Checkov
      # Fails the pipeline if critical security issues are detected
      - name: Security Scan (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false 

      # Generate a speculative execution plan
      - name: Terraform Plan
        run: terraform plan -input=false

      # Apply the infrastructure changes only on the main branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false